<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Showcase - APU Game Development Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .showcase-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            width: 100%;
            padding: 2rem;
            margin-top: 50px;
        }

        .showcase-title {
            font-size: 3vw;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.1);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        /* Hover effect for navigation item */
        .pill-nav a.active {
            color: #ffffff;
            opacity: 1;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .showcase-title {
                font-size: 8vw;
                text-align: center;
            }

            .video-wrapper {
                max-width: 95vw;
                border-radius: 8px;
            }
        }
    </style>
</head>

<body>
    <nav class="pill-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="merch.html">Merch</a></li>
            <li><a href="showcase.html" class="active">Games Showcase</a></li>
            <li><a href="ggw.html">GGW</a></li>
            <li><a href="hall-of-fame.html">Hall of Fame</a></li>
        </ul>
    </nav>

    <div class="showcase-content parallax-group">
        <h1 class="showcase-title">APUGD Showreel 2025</h1>

        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/u2Ekb78eB1Q?si=LFTEuYrrHqDfFLLL" title="APUGD Showreel 2025"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
