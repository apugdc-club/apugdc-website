<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame - APU Game Development Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hof-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 10;
            width: 100%;
            height: 100dvh;
            padding: 120px 2rem 2rem 2rem;
            position: absolute;
            top: 0;
            left: 0;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .hof-title {
            font-size: 4vw;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 0, 234, 0.5);
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .hof-table {
            width: 100%;
            max-width: 800px;
            border-collapse: separate;
            border-spacing: 0;
            background: rgba(20, 20, 25, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .hof-table th, .hof-table td {
            padding: 1.5rem 2.5rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hof-table th {
            color: #ff00ea;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.3);
        }

        .hof-table td {
            color: #e2e8f0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .hof-table tbody tr {
            transition: background 0.3s ease;
        }

        .hof-table tbody tr:hover {
            background: rgba(0, 255, 255, 0.05);
        }

        .hof-table tbody tr:last-child th,
        .hof-table tbody tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .hof-title {
                font-size: 8vw;
                margin-top: 1rem;
                margin-bottom: 2rem;
            }
            .hof-container {
                padding-top: 100px;
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .hof-table th, .hof-table td {
                padding: 1rem;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <nav class="pill-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="merch.html">Merch</a></li>
            <li><a href="showcase.html">Games Showcase</a></li>
            <li><a href="ggw.html">GGW</a></li>
            <li><a href="hall-of-fame.html" class="active">Hall of Fame</a></li>
        </ul>
    </nav>

    <div class="hof-container parallax-group">
        <h1 class="hof-title">Committee 2026</h1>

        <table class="hof-table">
            <thead>
                <tr>
                    <th>Role</th>
                    <th>Name</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>President</td>
                    <td>Azwa</td>
                </tr>
                <tr>
                    <td>Vice President</td>
                    <td>Dominic</td>
                </tr>
                <tr>
                    <td>Event Head</td>
                    <td>Saif</td>
                </tr>
                <tr>
                    <td>External Affairs Head</td>
                    <td>Anas</td>
                </tr>
                <tr>
                    <td>Marketing Head</td>
                    <td>Aghaz</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
